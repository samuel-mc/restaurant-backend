# Nombre de la aplicación
spring.application.name=restaurant-backend

# Perfil activo por defecto
spring.profiles.active=local

# Hilos Virtuales activos de manera global para todos los perfiles
spring.threads.virtual.enabled=true

# Desactivar open-in-view por buenas prácticas de rendimiento
spring.jpa.open-in-view=false

# Ubicación común de las migraciones
spring.flyway.locations=classpath:db/migration
